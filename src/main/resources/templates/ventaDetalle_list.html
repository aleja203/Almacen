<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="/fragments/head :: head"></head>

<body>

    <nav th:replace="/fragments/navbar :: nav"></nav>
    
    <div th:if="${error != null}" class="card text-white bg-danger mb-3 mensajeError">
        <div class="card-body">
            <h5 class="card-title">Error 👎</h5>
            <p class="card-text" th:text="${error}"></p>
        </div>
    </div>
    <div th:if="${exito != null}" class="card text-white bg-success mb-3 mt-3 mensajeExito">
        <div class="card-body">
            <h5 class="card-title">Exito!</h5>
            <p class="card-text" th:text="${exito}"></p>
        </div>
    </div>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-6">
                <label for="productoSelect">Producto:</label>
                <select id="productoSelect" class="form-control">
                    <option value="">Seleccionar Producto</option>
                    <option th:each="producto : ${productos}"
                            th:value="${producto.codigo}"
                            th:text="${producto.descripcion}">
                    </option>
                </select>
            </div>
            <div class="col-md-6">
                <label for="clienteSelect">Cliente:</label>
                <select id="clienteSelect" class="form-control">
                    <option value="">Seleccionar Cliente</option>
                    <option th:each="cliente : ${clientes}"
                            th:value="${cliente.dni}"
                            th:text="${cliente.nombre}">
                    </option>
                </select>
            </div>

            
        </div>
<a th:href="@{/venta/lista}" class="btn btn-secondary mt-2">Reiniciar filtros</a>

    <br>
    <br>
    
    <table class="table table-dark">
        <thead>
            <tr>
                <th scope="col">Fecha</th>
                <th scope="col">Cliente</th>
                <th scope="col">Factura</th>
                <th scope="col">Producto</th>
                <th scope="col">Cantidad</th>
                <th scope="col">Precio</th>
                <th scope="col">Total</th>


            </tr>
        </thead>
        <tbody>
            <!-- Iteramos sobre la lista de ventas -->
            <tr th:each="venta : ${ventas}">
                <td th:text="${venta['fecha']}"></td> <!-- Mostrar la fecha de la venta -->
                <td th:text="${venta['cliente']}"></td> <!-- Mostrar el nombre del cliente -->
                <td th:text="${venta['id']}"></td> <!-- Mostrar el nombre del cliente -->
                <td th:text="${venta['producto']}"></td> <!-- Mostrar el nombre del producto -->
                <td th:text="${venta['cantidad']}"></td> <!-- Mostrar la cantidad del producto vendido -->
                <td th:text="${venta['precioVenta']}"></td> <!-- Mostrar el precio de venta -->
                <td th:text="${venta['total']}"></td> <!-- Mostrar el precio de venta -->
<!--                <td>
                    <a th:href="@{/venta/eliminar/{id}(id=${venta['id']})}">
                        <i class="fas fa-feather-alt"></i>Eliminar
                    </a>
                </td>-->
            </tr>
        </tbody>


    </table>

    </div>


        <section class=" text-center container">
            <div class="row mt-3">
                <div class="divVolver">
                    <a th:href="@{/}" class="btn btn-secondary my-2 botonVolver botones">Volver</a>
                </div>
            </div>
        </section>

    <footer th:replace= "/fragments/footer :: footer"></footer>

    <script src="/producto_list.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
